<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hair Color Offer</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#111;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

/* Image Slider */

.slider{
position:relative;
max-width:400px;
margin:auto;
}

.slider img{
width:100%;
border-radius:10px;
}

.price{
font-size:26px;
color:green;
font-weight:bold;
}

.stock{
color:red;
font-weight:bold;
margin:10px 0;
}

.offer{
background:red;
color:white;
padding:10px;
margin:15px 0;
border-radius:5px;
}

.review{
background:#fafafa;
padding:10px;
margin:10px;
border-radius:5px;
}

input,textarea,select{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e60000;
}

/* Floating WhatsApp */

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="header">
Natural Hair Color
</div>

<div class="container">

<div class="card">

<div class="slider">
<img id="slide" src="https://i.ibb.co.com/tPY43dbr/hair-color.jpg">
</div>

<h2>Natural Hair Color</h2>

<p>100% safe and easy hair coloring solution.</p>

<div class="price" id="price">1200 BDT</div>

<div class="stock">
⚡ Only <span id="stock">7</span> Pieces Left
</div>

<div class="offer">
🔥 Special Offer Today Only
</div>

<h3>Customer Reviews</h3>

<div class="review">⭐️⭐️⭐️⭐️⭐️ Very good product</div>
<div class="review">⭐️⭐️⭐️⭐️ Works perfectly</div>

<h3>Order Now</h3>

<form action="https://formspree.io/f/mwvreava" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<textarea name="address" placeholder="Your Address" required></textarea>

<label>Select Quantity</label>

<select name="quantity" onchange="changePrice(this.value)">

<option value="1">1 Piece</option>
<option value="2">2 Pieces</option>
<option value="3">3 Pieces</option>

</select>

<br>

<button type="submit">Place Order</button>

</form>

</div>

</div>

<a class="whatsapp-float" href="https://wa.me/880XXXXXXXXXX">
💬
</a>

<script>

/* Price change */

function changePrice(q){

if(q==1){
document.getElementById("price").innerText="1200 BDT";
}

if(q==2){
document.getElementById("price").innerText="2200 BDT";
}

if(q==3){
document.getElementById("price").innerText="3000 BDT";
}

}

/* Image Slider */

var images=[
"https://i.ibb.co.com/tPY43dbr/hair-color.jpg",
"https://i.ibb.co.com/tPY43dbr/hair-color.jpg",
"https://i.ibb.co.com/tPY43dbr/hair-color.jpg"
];

var i=0;

setInterval(function(){

i++;

if(i>=images.length){
i=0;
}

document.getElementById("slide").src=images[i];

},3000);

/* Stock counter */

var stock=7;

setInterval(function(){

if(stock>3){
stock--;
document.getElementById("stock").innerText=stock;
}

},8000);

</script>

</body>
</html>
